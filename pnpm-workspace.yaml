packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/ui-modulith/*'
  - 'libs/federation/*'
  - 'infra/*'

dedupePeers: true

allowBuilds:
  '@parcel/watcher': true
  '@pulumi/kubernetes': true
  '@swc/core': true
  cpu-features: false
  esbuild: true
  less: false
  lmdb: true
  msgpackr-extract: true
  msw: true
  nx: true
  protobufjs: true
  sharp: true
  ssh2: false
  unrs-resolver: true
