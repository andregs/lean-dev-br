openapi: 3.0.3
info:
  title: Wanderlust Catalog API
  # BFF REST edge — the contract-first source of truth for the destinations read path.
  # `weather` is optional so degradation (upstream failure / kill-switch flag) can omit it
  # without breaking the contract.
  version: 1.0.0
paths:
  /destinations:
    get:
      operationId: listDestinations
      summary: List all destinations
      responses:
        '200':
          description: Destination list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Destination'
        default:
          description: Unexpected error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /destinations/{id}:
    get:
      operationId: getDestination
      summary: Get a single destination by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Destination detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Destination'
        '404':
          description: Destination not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    Destination:
      type: object
      required:
        - id
        - name
        - country
        - description
        - imageUrl
      properties:
        id:
          type: string
          example: fernando-de-noronha-br
        name:
          type: string
          example: Fernando de Noronha
        country:
          type: string
          example: Brazil
        description:
          type: string
          example: Volcanic archipelago with turquoise bays and spinner dolphins.
        imageUrl:
          type: string
          example: /images/fernando-de-noronha.jpg
        latitude:
          type: number
          format: double
          example: -3.85
        longitude:
          type: number
          format: double
          example: -32.42
        weather:
          $ref: '#/components/schemas/Weather'
    Weather:
      type: object
      required:
        - temperatureC
        - weatherCode
      properties:
        temperatureC:
          type: number
          format: double
          example: 27.4
        weatherCode:
          type: integer
          description: WMO weather interpretation code.
          example: 1
    Problem:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
