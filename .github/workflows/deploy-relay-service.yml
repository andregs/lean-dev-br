name: Deploy relay-service

on:
  push:
    branches: [main]
    paths:
      - 'apps/relay-service/**'
      - 'infra/relay-service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: graalvm-community
          java-version: '25'

      - run: pnpm install --frozen-lockfile

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set image ref
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "RELAY_IMAGE=us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build native image
        run: pnpm nx run relay-service:docker-build

      - name: Push image
        run: pnpm nx run relay-service:docker-push

      - name: Deploy to Cloud Run
        run: |
          pnpm exec pulumi up --stack prod --yes \
            --config "lean-dev-br-relay-service:imageTag=${SHORT_SHA}"
        working-directory: infra/relay-service
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
