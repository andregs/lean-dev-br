name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # full history needed for nx affected to compute the correct base
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Derive NX_BASE
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "NX_BASE=${PR_BASE_SHA}" >> "$GITHUB_ENV"
          elif [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${BEFORE_SHA}" 2>/dev/null; then
            # First push to branch, or force-push that orphaned the previous commit
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${BEFORE_SHA}" >> "$GITHUB_ENV"
          fi
          echo "NX_HEAD=${HEAD_SHA}" >> "$GITHUB_ENV"

      - run: pnpm nx affected -t lint typecheck test test:bundle build e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: '**/playwright-report/'
          retention-days: 7
