name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # full history needed for nx affected to compute the correct base
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Derive NX_BASE
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "NX_BASE=$PR_BASE_SHA" >> "$GITHUB_ENV"
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            # First push to a new branch — no previous commit on remote; diff against main
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=$BEFORE_SHA" >> "$GITHUB_ENV"
          fi
          echo "NX_HEAD=$CURRENT_SHA" >> "$GITHUB_ENV"

      - run: pnpm nx affected -t lint typecheck test build e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: '**/playwright-report/'
          retention-days: 7
