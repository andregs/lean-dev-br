name: Security scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily at 03:00 UTC — backstop for newly-disclosed CVEs on unchanged deps.
    # Dependabot alerts fire immediately; this catches gaps and the deployed image.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  osv-source:
    name: OSV — source manifests
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      security-events: write
      contents: read
      actions: read
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
        --lockfile=apps/relay-service/pom.xml
      fail-on-vuln: false

  trivy-deployed-image:
    name: Trivy — deployed relay image
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Pull deployed image
        run: docker pull us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest

      - name: Scan deployed image for CVEs
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest
          format: sarif
          output: trivy-deployed.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: ${{ !cancelled() }}
        with:
          sarif_file: trivy-deployed.sarif
          category: trivy-relay-deployed
