name: Security scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily at 03:00 UTC — backstop for newly-disclosed CVEs on unchanged deps.
    # Dependabot alerts fire immediately; this catches gaps and the deployed image.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  osv-source:
    name: OSV — source manifests
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      security-events: write
      contents: read
      actions: read
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
        --lockfile=apps/relay-service/pom.xml
      fail-on-vuln: false

  trivy-deployed-image:
    name: Trivy — deployed relay image
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Check image exists
        id: image-check
        run: |
          if docker manifest inspect us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest > /dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::relay :latest not yet published — skipping deployed-image scan"
          fi

      - name: Pull deployed image
        if: steps.image-check.outputs.present == 'true'
        run: docker pull us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest

      - name: Scan deployed image for CVEs
        if: steps.image-check.outputs.present == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest
          format: sarif
          output: trivy-deployed.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: steps.image-check.outputs.present == 'true' && !cancelled()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-deployed.sarif
          category: trivy-relay-deployed
