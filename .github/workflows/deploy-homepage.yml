name: Deploy homepage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run-many -t build -p homepage,contact-api --skip-nx-cache
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}
          VITE_RUM_APP_MONITOR_ID: ${{ vars.VITE_RUM_APP_MONITOR_ID }}
          VITE_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          VITE_RUM_SESSION_SAMPLE_RATE: ${{ vars.VITE_RUM_SESSION_SAMPLE_RATE }}

      - run: pnpm nx run blog:postbuild --skip-nx-cache
        env:
          NEXT_PUBLIC_RUM_APP_MONITOR_ID: ${{ vars.VITE_RUM_APP_MONITOR_ID }}
          NEXT_PUBLIC_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          NEXT_PUBLIC_RUM_SESSION_SAMPLE_RATE: ${{ vars.VITE_RUM_SESSION_SAMPLE_RATE }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: pulumi/actions@v7
        with:
          command: up
          stack-name: prod
          work-dir: infra/homepage
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Invalidate stale CloudFront cache
        run: |
          DIST_ID=$(cd infra/homepage && pulumi stack output distributionId --stack prod)
          # Blog HTML is now CACHING_DISABLED — no invalidation needed for future deploys.
          # This step clears any stale entries left over from the previous CACHING_OPTIMIZED policy.
          # Safe to remove once the old TTL has expired on all edge nodes.
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
