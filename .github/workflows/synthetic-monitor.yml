name: Synthetic monitor

on:
  schedule:
    # Nightly at 07:00 São Paulo (BRT = UTC-3) → 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install

      - name: Run prod smoke tests
        env:
          E2E_BASE_URL: https://lean.dev.br
          E2E_FULL: '1'
          # Auto-retry is opt-in to detect flakes, not paper over them — the next
          # step flags a retried-but-passed run instead of silently greening it.
          E2E_FLAKE_RETRY: '1'
        run: |
          set -o pipefail
          pnpm nx run-many -t e2e -- --grep @prod-safe 2>&1 | tee ci-run.log

      - name: Flag flaky tests
        if: always()
        run: |
          clean="$(sed -r 's/\x1b\[[0-9;]*m//g' ci-run.log)"
          if echo "$clean" | grep -qE '^[[:space:]]*[0-9]+ flaky'; then
            echo "::warning::Flaky test(s) detected — retried, then passed. Not a hard failure, but investigate before it becomes one."
            {
              echo "### ⚠️ Flaky tests detected (retried, then passed)"
              echo '```'
              echo "$clean" | grep -A20 -E '^[[:space:]]*[0-9]+ flaky'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: '**/playwright-report/'
          retention-days: 7
