name: Main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      deploy-frontend: ${{ steps.flags.outputs.deploy-frontend }}
      deploy-relay: ${{ steps.flags.outputs.deploy-relay }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '25'

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Derive NX_BASE
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] \
            || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${BEFORE_SHA}" 2>/dev/null; then
            echo "NX_BASE=HEAD~1" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${BEFORE_SHA}" >> "$GITHUB_ENV"
          fi
          echo "NX_HEAD=${HEAD_SHA}" >> "$GITHUB_ENV"

      - name: Compute deploy flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger: always deploy everything that verify passes
            echo "deploy-frontend=true" >> "$GITHUB_OUTPUT"
            echo "deploy-relay=true" >> "$GITHUB_OUTPUT"
          else
            AFFECTED=$(pnpm nx show projects --affected --json 2>/dev/null || echo "[]")
            echo "Affected: $AFFECTED"
            if echo "$AFFECTED" | jq -e 'any(.[]; . == "homepage" or . == "contact-api" or . == "todo" or . == "blog" or . == "ui-modulith" or . == "@lean-dev-br/infra-homepage")' > /dev/null; then
              echo "deploy-frontend=true" >> "$GITHUB_OUTPUT"
            else
              echo "deploy-frontend=false" >> "$GITHUB_OUTPUT"
            fi
            if echo "$AFFECTED" | jq -e 'any(.[]; . == "relay-service" or . == "@lean-dev-br/infra-relay-service")' > /dev/null; then
              echo "deploy-relay=true" >> "$GITHUB_OUTPUT"
            else
              echo "deploy-relay=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - run: pnpm nx affected -t lint typecheck test build e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: '**/playwright-report/'
          retention-days: 7

  deploy-frontend:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.deploy-frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run-many -t build -p homepage,contact-api,todo,ui-modulith --skip-nx-cache
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}
          VITE_FLAGS_URL: ${{ vars.VITE_FLAGS_URL }}
          VITE_RUM_APP_MONITOR_ID: ${{ vars.VITE_RUM_APP_MONITOR_ID }}
          VITE_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          VITE_RUM_SESSION_SAMPLE_RATE: ${{ vars.VITE_RUM_SESSION_SAMPLE_RATE }}
          VITE_RELAY_URL: ${{ vars.VITE_RELAY_URL }}

      - run: pnpm nx run blog:postbuild --skip-nx-cache
        env:
          NEXT_PUBLIC_RUM_APP_MONITOR_ID: ${{ vars.VITE_RUM_APP_MONITOR_ID }}
          NEXT_PUBLIC_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          NEXT_PUBLIC_RUM_SESSION_SAMPLE_RATE: ${{ vars.VITE_RUM_SESSION_SAMPLE_RATE }}

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7
        with:
          command: up
          stack-name: prod
          work-dir: infra/homepage
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  deploy-relay:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.deploy-relay == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '25'

      - run: pnpm install --frozen-lockfile

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set image ref
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "RELAY_IMAGE=us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELAY_IMAGE_LATEST=us-central1-docker.pkg.dev/lean-dev-br/relay-service/relay-service:latest" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build native image
        run: pnpm nx run relay-service:docker-build

      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.RELAY_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: ${{ !cancelled() }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy-relay-build

      - name: Push image
        run: pnpm nx run relay-service:docker-push

      - name: Tag as latest
        run: |
          docker tag "$RELAY_IMAGE" "$RELAY_IMAGE_LATEST"
          docker push "$RELAY_IMAGE_LATEST"

      - name: Deploy to Cloud Run
        run: |
          pnpm exec pulumi up --stack prod --yes \
            --config "lean-dev-br-relay-service:imageTag=${SHORT_SHA}"
        working-directory: infra/relay-service
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
