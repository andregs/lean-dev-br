config:
  gcp:project: lean-dev-br # replace with actual GCP project ID
  gcp:region: us-central1
  # Docker image tag to deploy. Set via CLI after each docker-push:
  #   pulumi config set imageTag <tag>
  # Omit to deploy with a placeholder image (creates the Cloud Run service; no traffic served).

  # Grafana OTLP gateway for traces. Full URL including the /v1/traces suffix —
  # Spring's management.opentelemetry.tracing.export.otlp.endpoint property
  # expects the complete signal-specific path, unlike a base URL.
  lean-dev-br-relay-service:otelOtlpEndpoint: 'https://otlp-gateway-prod-sa-east-1.grafana.net/otlp/v1/traces'
  # Set via CLI — the literal "Authorization" header value (e.g. "Basic <base64>"):
  #   pulumi config set --secret otelOtlpAuthorization 'Basic <base64 instanceId:token>'
  lean-dev-br-relay-service:otelOtlpAuthorization:
    secure: 
  lean-dev-br-relay-service:pruneToken:
    secure: AAABAK33kokUvSPce+J4G0OkKjoTkBN2H7rB3+i6qOvXPWzeygVgMxvnnSsl3IfWBgBt3o9Jc/yM6yViQkzldSenL0pInmjZD30uI0cCJWaaAhvmXDoWTJG/vIMzCdAb
  lean-dev-br-relay-service:alertEmail:
    secure: AAABAGRmmdFg7kCtkYYP4NrekTdDStvWJFLVNj4HL2K+tWiT9Mp5ePGNhY79dHFl3g==
