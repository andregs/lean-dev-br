config:
  aws:region: us-east-1
  lean-dev-br-homepage:domain: lean.dev.br
  # CSP-report endpoint guardrails (API Gateway throttle + Lambda log cap)
  lean-dev-br-homepage:cspReportRateLimit: "10"
  lean-dev-br-homepage:cspReportBurstLimit: "20"
  lean-dev-br-homepage:cspReportMaxBytes: "2048"
  # Set secrets via CLI — never commit plaintext values:
  #   pulumi config set --secret notifyEmail <your-email>
  #   pulumi config set --secret recaptchaSecret <secret-key>
  lean-dev-br-homepage:notifyEmail:
    secure: AAABAGuUMUxT1TPG3teKIzO38YtusrKhXZvDsL4GeQc29LNmg1ISzi1bEQIZsuQAyw==
  lean-dev-br-homepage:recaptchaSecret:
    secure: AAABALZtdQpcB6L7iXeR5UvRoOLLcuK0gyJbliwhPJtQnt4N0qOOYSdP13wsQCGwo9+GbGvU22sOK7zDNoXp76th00IGdKG4
