spring:
  config:
    activate:
      on-profile:
        - prod
logging:
  structured:
    format:
      console: ecs # elastic common schema
  level:
    # WARN surfaces real export failures (BatchSpanProcessor logs exceptions
    # at WARNING) without DEBUG's routine noise. To re-diagnose OTLP export
    # issues, raise to DEBUG at runtime (no redeploy, plain property read,
    # not an AOT-baked conditional): LOGGING_LEVEL_IO_OPENTELEMETRY_EXPORTER=DEBUG
    '[io.opentelemetry.exporter]': WARN
    '[io.opentelemetry.sdk.trace.export]': WARN

management:
  tracing:
    sampling:
      probability: 1.0 # no sampling — see libs/faro's equivalent decision; traffic is far under free-tier limits either way

relay:
  cors:
    allowed-origins: 'https://lean.dev.br'
