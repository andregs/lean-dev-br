spring:
  application:
    name: wanderlust-catalog
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

management:
  endpoint:
    health:
      # Redis remains in the overall /actuator/health status for visibility, but is excluded from
      # readiness because WeatherCache degrades gracefully without it; a cache-only outage shouldn't
      # block rollouts.
      probes:
        enabled: true
      group:
        readiness:
          exclude: redis

catalog:
  weather:
    base-url: https://api.open-meteo.com/v1/forecast
    connect-timeout: 2s
    read-timeout: 4s
    cache-ttl: 15m
    cache-coord-precision: 2
  flags:
    flags-url: https://lean.dev.br/flags.json

logging:
  level:
    '[br.dev.lean.wanderlust.catalog]': DEBUG
